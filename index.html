<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accelerometer Sender</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
      padding: 20px;
    }
    h1 { margin-bottom: 24px; }
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .value { font-size: 1.5rem; margin: 8px 0; }
    button {
      width: 48%;
      padding: 16px;
      font-size: 1.2rem;
      border: none;
      border-radius: 12px;
      margin: 8px;
      cursor: pointer;
    }
    .start { background: #22c55e; color: white; }
    .stop   { background: #ef4444; color: white; }
    .status { margin-top: 20px; font-size: 1.3rem; font-weight: bold; }
    .info { font-size: 1rem; color: #94a3b8; margin-top: 12px; }
  </style>
</head>
<body>

<h1>📱 Accel Sender</h1>

<div class="card">
  <div class="value">X: <span id="x">—</span></div>
  <div class="value">Y: <span id="y">—</span></div>
  <div class="value">Z: <span id="z">—</span></div>
  <div class="value">Magnitude: <span id="mag">—</span></div>
</div>

<div>
  <button class="start" onclick="startSensor()">START</button>
  <button class="stop" onclick="stopSensor()">STOP</button>
</div>

<div class="status" id="status">Sensor OFF</div>
<div class="info" id="deviceInfo">Detecting device...</div>

<script>
const DEVICE_ID = "dev-001";
const SERVER_URL = "https://script.google.com/macros/s/AKfycbxQHTQUlAMTpFOANC_Kk_xDWpnmw4BnKeEH9cqcqHiAyLcRfST5a5SByN-J6yy8adgXow/exec";
// const SPREADSHEET_ID = "1tKSOoq2u9R-jCYhSYJk70JdXDh7nLI7BwJFBF8DRe8E"; // tidak dipakai di sini, sudah di gs

let sensorActive = false;
let samples = [];
let sendTimer;
let isMobile = false;
let motionListenerAdded = false;
let motionDataReceived = false;

function getMagnitude(x, y, z) {
  return Math.sqrt(x*x + y*y + z*z).toFixed(2);
}

function updateUI(x = 0, y = 0, z = 0) {
  document.getElementById("x").textContent = x.toFixed(2);
  document.getElementById("y").textContent = y.toFixed(2);
  document.getElementById("z").textContent = z.toFixed(2);
  const mag = getMagnitude(x, y, z);
  document.getElementById("mag").textContent = mag;

  const statusEl = document.getElementById("status");
  if (motionDataReceived) {
    if (Math.abs(mag - 9.8) < 1.5) {
      statusEl.textContent = "🟢 Sensor ON – Stabil (gravitasi normal)";
    } else if (mag > 1) {
      statusEl.textContent = "🟡 Sensor ON – Bergerak! Mag: " + mag;
    } else {
      statusEl.textContent = "🟡 Sensor ON – Data minim, goyang lebih kuat";
    }
  } else {
    statusEl.textContent = "🟡 Sensor ON – Menunggu data pertama...";
  }
}

function startSensor() {
  if (sensorActive) return;
  sensorActive = true;
  motionDataReceived = false;
  motionListenerAdded = false;

  document.getElementById("status").textContent = "🟢 Sensor ON – Memulai...";
  updateUI();

  isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  document.getElementById("deviceInfo").textContent = isMobile 
    ? "Device: Mobile/Tablet → Pakai accelerometer asli" 
    : "Device: Laptop/Desktop → Gerakkan mouse untuk simulasi";

  if (isMobile) {
    const addListener = () => {
      if (motionListenerAdded) return;
      motionListenerAdded = true;
      window.addEventListener("devicemotion", onRealMotion, { passive: true });
      console.log("Listener accelerometer ditambahkan");
      sendTimer = setInterval(sendLatest, 10000); // 10 detik sekali kirim 1 data
      setTimeout(checkMotionStatus, 5000);
    };

    if (typeof DeviceMotionEvent.requestPermission === 'function') {
      DeviceMotionEvent.requestPermission()
        .then(perm => {
          console.log("Izin iOS:", perm);
          if (perm === "granted") addListener();
          else document.getElementById("status").textContent = "🔴 Izin ditolak";
        })
        .catch(err => {
          console.error("Error izin:", err);
          document.getElementById("status").textContent = "🔴 Error izin: " + err.message;
        });
    } else {
      addListener();
    }
  } else {
    window.addEventListener("mousemove", onMouseSimulate);
    sendTimer = setInterval(sendLatest, 10000);
    document.getElementById("status").textContent = "🟢 Sensor ON (simulasi) – Gerakkan mouse!";
  }
}

function stopSensor() {
  sensorActive = false;
  motionListenerAdded = false;
  window.removeEventListener("devicemotion", onRealMotion);
  window.removeEventListener("mousemove", onMouseSimulate);
  clearInterval(sendTimer);
  document.getElementById("status").textContent = "🔴 Sensor OFF";
  updateUI(0, 0, 0);
}

function onRealMotion(event) {
  if (!sensorActive) return;
  motionDataReceived = true;
  console.log("Data accelerometer masuk!");
  const acc = event.accelerationIncludingGravity || {x:0, y:0, z:0};
  const x = acc.x ?? 0;
  const y = acc.y ?? 0;
  const z = acc.z ?? 0;
  updateUI(x, y, z);
  samples.push({ t: Date.now(), x, y, z });
}

let prevMouseX = 0, prevMouseY = 0;
function onMouseSimulate(event) {
  if (!sensorActive) return;
  motionDataReceived = true;
  const dx = (event.clientX - prevMouseX) * 0.08;
  const dy = (event.clientY - prevMouseY) * 0.08;
  const x = dx;
  const y = dy;
  const z = 9.8 + (Math.random() * 0.4 - 0.2);
  updateUI(x, y, z);
  samples.push({ t: Date.now(), x, y, z });
  prevMouseX = event.clientX;
  prevMouseY = event.clientY;
}

function checkMotionStatus() {
  if (!sensorActive || motionDataReceived) return;
  document.getElementById("status").textContent = "🟠 Sensor ON tapi nol? Goyang kuat atau cek izin browser";
}

// Fungsi baru: kirim HANYA 1 data terbaru setiap 10 detik
function sendLatest() {
  if (samples.length === 0) {
    console.log("Tidak ada data baru untuk dikirim");
    return;
  }

  // Ambil sample terakhir saja
  const latestSample = samples[samples.length - 1];
  const payload = {
    device_id: DEVICE_ID,
    samples: [latestSample]  // hanya 1 item
  };

  console.log(`Kirim 1 data terbaru (t: ${latestSample.t})`);

  fetch(SERVER_URL + "?path=telemetry/accel", {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload)
  })
  .then(() => {
    console.log("Fetch POST 1 data dikirim (no-cors)");
    samples = []; // reset semua setelah kirim (biar tidak numpuk)
  })
  .catch(err => console.error("Fetch gagal:", err));
}
</script>

</body>
</html>
